spring.application.name=metadata-service

server.port=8080

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/distributed_file_storage_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:kunsql248#}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

storage.node.url=${STORAGE_NODES:http://localhost:8081,http://localhost:8082}

# Wait up to 60 seconds for the DB to wake up
spring.datasource.hikari.initialization-fail-timeout=60000
# Connection timeout for individual attempts
spring.datasource.hikari.connection-timeout=30000